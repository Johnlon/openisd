<svg xmlns="http://www.w3.org/2000/svg"
     width="600" height="300"
     viewBox="0 0 600 300">

  <!-- Background grid (optional, remove if not needed) -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20"
            fill="none" stroke="#1f3b5a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="600" height="300" fill="#0b1f33"/>
  <rect x="0" y="0" width="600" height="300" fill="url(#grid)" opacity="0.35"/>

  <!-- Driver outline (side cross-section, simplified) -->
  <!-- Basket / frame -->
  <rect x="220" y="80" width="160" height="120"
        fill="none" stroke="#9fd3ff" stroke-width="2"/>

  <!-- Cone (Thick) -->
  <polygon points="230,90 370,90 260,150"
           fill="none" stroke="#9fd3ff" stroke-width="2"/>

  <!-- Voice coil / former (VCd) -->
  <rect x="260" y="140" width="20" height="40"
        fill="none" stroke="#9fd3ff" stroke-width="2"/>

  <!-- Magnet block (Magnet) -->
  <rect x="280" y="150" width="60" height="40"
        fill="none" stroke="#9fd3ff" stroke-width="2"/>

  <!-- Magnet depth (MagDpt) indication -->
  <line x1="280" y1="150" x2="280" y2="190"
        stroke="#9fd3ff" stroke-width="2"/>

  <!-- Outer diameter (Outer) -->
  <line x1="220" y1="80" x2="380" y2="80"
        stroke="#9fd3ff" stroke-width="2"/>

  <!-- Total depth (Depth) -->
  <line x1="220" y1="80" x2="220" y2="200"
        stroke="#9fd3ff" stroke-width="2"/>

  <!-- Basket height (Basket) -->
  <line x1="380" y1="80" x2="380" y2="200"
        stroke="#9fd3ff" stroke-width="2"/>

  <!-- Dimension arrows and labels -->

  <!-- Thick (cone thickness, schematic) -->
  <line x1="230" y1="90" x2="230" y2="100"
        stroke="#9fd3ff" stroke-width="1"/>
  <line x1="370" y1="90" x2="370" y2="100"
        stroke="#9fd3ff" stroke-width="1"/>
  <line x1="230" y1="95" x2="370" y2="95"
        stroke="#9fd3ff" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="300" y="115" fill="#9fd3ff" font-size="12" text-anchor="middle">Thick</text>

  <!-- Outer -->
  <line x1="220" y1="70" x2="380" y2="70"
        stroke="#9fd3ff" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="300" y="60" fill="#9fd3ff" font-size="12" text-anchor="middle">Outer</text>

  <!-- Basket -->
  <line x1="390" y1="80" x2="390" y2="200"
        stroke="#9fd3ff" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="405" y="145" fill="#9fd3ff" font-size="12">Basket</text>

  <!-- Magnet -->
  <line x1="350" y1="150" x2="350" y2="190"
        stroke="#9fd3ff" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="360" y="175" fill="#9fd3ff" font-size="12">Magnet</text>

  <!-- MagDpt -->
  <line x1="270" y1="150" x2="270" y2="190"
        stroke="#9fd3ff" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="250" y="175" fill="#9fd3ff" font-size="12">MagDpt</text>

  <!-- Depth -->
  <line x1="210" y1="80" x2="210" y2="200"
        stroke="#9fd3ff" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="190" y="145" fill="#9fd3ff" font-size="12">Depth</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6"
            refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9fd3ff"/>
    </marker>
  </defs>
</svg>